# 빌딘 컨텐츠 자동화 - GitHub Actions 워크플로우
# 1) 매일 오전 10시(KST): 새 컨텐츠 수집 + D+6 수치 업데이트
# 2) 매주 일요일 오전 9시(KST): 주간 분석 리포트 생성

name: 빌딘 주간 컨텐츠 자동화

on:
  # 매일 01:00 UTC = 한국시간 10:00 (새 컨텐츠 수집 + D+6 수치)
  schedule:
    - cron: '0 1 * * *'
  
  # 수동 실행
  workflow_dispatch:
    inputs:
      command:
        description: '실행할 명령 (full/collect/analyze/test)'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - collect
          - analyze
          - test

jobs:
  run-automation:
    runs-on: ubuntu-latest
    
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 자동화 실행
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NOTION_CONTENT_DB_ID: ${{ secrets.NOTION_CONTENT_DB_ID }}
          NOTION_WEEKLY_DB_ID: ${{ secrets.NOTION_WEEKLY_DB_ID }}
          NOTION_ANALYSIS_PAGE_ID: ${{ secrets.NOTION_ANALYSIS_PAGE_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          INSTAGRAM_MAGAZINE_ACCOUNT_ID: ${{ secrets.INSTAGRAM_MAGAZINE_ACCOUNT_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: |
          # 수동 실행이면 입력값 사용, 스케줄이면 요일에 따라 결정
          if [ -n "${{ github.event.inputs.command }}" ]; then
            COMMAND="${{ github.event.inputs.command }}"
          else
            # 일요일(0)이면 full, 나머지는 collect
            DAY_OF_WEEK=$(date -u +%u)
            if [ "$DAY_OF_WEEK" = "7" ]; then
              COMMAND="full"
            else
              COMMAND="collect"
            fi
          fi
          echo "🚀 실행 명령: $COMMAND"
          python main.py $COMMAND
